apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-service-ingress
  labels:
    app: ml-service
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: ml-service.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ml-service
                port:
                  number: 80
