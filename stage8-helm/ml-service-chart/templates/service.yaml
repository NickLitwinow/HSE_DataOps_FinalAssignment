apiVersion: v1
kind: Service
metadata:
  name: {{ include "ml-service-chart.fullname" . }}
  labels:
    {{- include "ml-service-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ml-service-chart.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
